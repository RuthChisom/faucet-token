<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FaucetToken Frontend</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: #f4f4f9;
        color: #333;
        margin: 0;
        display: flex;
        justify-content: center;
        padding-top: 50px;
      }
      #root {
        width: 100%;
        max-width: 600px;
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      }
      button {
        cursor: pointer;
        padding: 10px 20px;
        border-radius: 6px;
        border: none;
        background-color: #007bff;
        color: white;
        font-weight: bold;
        transition: background-color 0.2s;
      }
      button:hover {
        background-color: #0056b3;
      }
      button:disabled {
        background-color: #ccc;
        cursor: not-allowed;
      }
      input {
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        width: 100%;
        box-sizing: border-box;
        margin-bottom: 10px;
      }
      .card {
        border: 1px solid #eee;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
      }
      .error {
        color: #dc3545;
        font-size: 0.9em;
        margin-top: 5px;
      }
      .success {
        color: #28a745;
        font-size: 0.9em;
        margin-top: 5px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
